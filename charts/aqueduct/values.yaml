global:
  security:
    allowInsecureImages: true # allow legacy containers until a new solution is found
  postgresql:
    fullnameOverride: "postgresql"
    auth:
      username: aqueduct
      password: aqueduct
      database: aqueduct
      # existingSecret: ""
      # secretKeys:
      #   adminPasswordKey: ""
      #   userPasswordKey: ""
      #   replicationPasswordKey: ""
    service:
      ports:
        postgresql: "5432"

image:
  repository: ghcr.io/tu-wien-datalab/aqueduct
  tag: latest
  pullPolicy: IfNotPresent

securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

djangoSecretKey:
  value: ""
  valueFrom:
    secretKeyRef:
      name: ""
      key: ""

oidc:
  signAlgo: "RS256"
  jwksEndpoint: ""
  authorizationEndpoint: ""
  tokenEndpoint: ""
  userEndpoint: ""
  clientId: "" # If using direct value
  clientSecret: "" # If using direct value
  # existingSecret: "" # Uncomment to use a secret
  # secretKeys:
  #   clientIdKey: ""
  #   clientSecretKey: ""


celery:
  brokerUrl: "redis://redis-master:6379/0"
  workerConcurrency: 1
  requestRetentionDays: 7
  schedule: "0 4 * * *"
  workerDeployment:
    replicas: 1
    resources: { }

silk:
  enabled: true

cors:
  allowAllOrigins: true
  urlsRegex: "^/(v1/)?(completions|chat/completions|embeddings|models|audio/|images/|files|batches|responses|mcp-servers/|vector_stores)"

tos:
  enabled: false
  gatewayValidation: true

logLevel: "WARNING"

# PostgreSQL connection for the Aqueduct app. Independent of which backend
# deploys the database, so the Bitnami subchart and a CNPG cluster can coexist
# during migration. Leave `host`/`name`/`username`/`password` empty to auto-derive
# them from the enabled backend (CNPG cluster when `cnpg.enabled`, else the
# Bitnami `postgresql` subchart). Set `host` explicitly to pin the app to a
# specific backend while both run side by side.
database:
  host: ""
  port: "5432"
  name: ""
  username: ""
  # Credentials: provide `password` directly, OR reference an `existingSecret`.
  # When CNPG is enabled and both are empty, the password is read from the
  # operator-created `<cluster>-app` Secret.
  password: ""
  existingSecret: ""
  secretKeys:
    password: "password"

env:
  - name: DATABASE_ENGINE
    value: "django.db.backends.postgresql"
  # - name: DATABASE_ENGINE
  #   value: "django.db.backends.sqlite3"

settingsPy:
  extra: |
    # You can add/override settings here
    # OIDC_DEFAULT_GROUPS = ["default"]
    # ORG_NAME_FROM_OIDC_GROUPS_FUNCTION = lambda x: "default"
    # ADMIN_GROUP = "default"

# Router configuration for litellm router
routerConfig: { }

# MCP configuration
mcpConfig: { }

# Files API configuration (external API for file upload and batch processing)
filesApi:
  # External API URL (required) - used for both Files and Batches API
  url: ""  # e.g., "https://api.openai.com"
  # API key for external endpoint
  apiKey: ""
  # Or use existing secret
  existingSecret: ""
  secretKeys:
    apiKey: ""

service:
  type: ClusterIP
  port: 8000

ingress:
  enabled: false
  className: ""
  annotations: { }
  host: chart-example.local
  path: /
  pathType: Prefix
  tls: false
  tlsSecretName: ""

postgresql:
  enabled: true
  image:
    repository: bitnamilegacy/postgresql
  primary:
    persistence:
      enabled: true
      size: 100Gi
    resources:
      limits:
        cpu: "8"
        memory: "24Gi"
      requests:
        cpu: "8"
        memory: "24Gi"

# CloudNativePG cluster (alternative to the Bitnami postgresql subchart).
# Requires the CNPG operator to be installed in the cluster. Can be enabled
# alongside `postgresql.enabled: true` so both databases run side by side while
# data is migrated (see `bootstrapFromExternal` below and docs/deployment.md).
# Because Bitnami wins when both are enabled, enabling CNPG never moves the app
# on its own: set `database.host` (and credentials) to cut over once the clone
# is ready.
cnpg:
  enabled: false
  cluster:
    nameOverride: ""       # defaults to {{ .Release.Name }}-postgres
    imageName: "ghcr.io/cloudnative-pg/postgresql:17.2"
    instances: 1
    database: aqueduct      # bootstrap initdb database name
    owner: aqueduct         # bootstrap initdb owner (app connects as this user)
    storage:
      size: 100Gi
    resources: { }
    # Arbitrary Cluster spec fields merged on top of the template (e.g.
    # postgresql.parameters, monitoring, affinity, backup, walArchive).
    spec: { }
  # Migrate data automatically by bootstrapping the CNPG cluster from an existing
  # PostgreSQL instance (e.g. the Bitnami subchart) via pg_basebackup, instead of
  # running initdb. CNPG clones the source at creation time and then promotes the
  # clone to a primary, so no separate dump/restore job is needed. The source must
  # allow replication connections (wal_level >= replica, a pg_hba `replication`
  # rule, and a user with REPLICATION privilege, e.g. the `postgres` superuser).
  # Only takes effect on first creation (the Cluster must not yet exist).
  bootstrapFromExternal:
    enabled: false
    name: bitnami          # internal name referenced by pg_basebackup.source
    connection:
      # Defaults to the Bitnami subchart connection when blank.
      host: ""            # defaults to global.postgresql.fullnameOverride
      port: ""            # defaults to global.postgresql.service.ports.postgresql
      database: ""        # db to connect to for the backup, defaults to "postgres"
      username: ""        # needs REPLICATION privilege, defaults to "postgres"
      # Source password: set `password` (plaintext; a Secret is auto-created) OR
      # reference an `existingSecret`. For the Bitnami subchart this is typically
      # the `postgres-password` in the `<release>-postgresql` Secret.
      password: ""
      existingSecret: ""
      secretKeys:
        password: "password"

redis:
  fullnameOverride: "redis"
  architecture: standalone
  image:
    repository: bitnamilegacy/redis
  auth:
    enabled: false
  master:
    persistence:
      enabled: false

tika:
  enabled: true



