global:
  scrape_interval: 5s
  evaluation_interval: 5s

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

rule_files: []

scrape_configs:
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'django'
    static_configs:
      - targets: ['localhost:8000']  # 'localhost' and not 'locust-web', because prometheus is on host network atm
    scrape_interval: 10s
    metrics_path: '/aqueduct/metrics'

  - job_name: 'locust'
    static_configs:
      - targets: ['localhost:8090']  # Locust metrics endpoint - running locally; see the comment above
