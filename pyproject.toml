[project]
name = "aqueduct"
version = "0.1.14"
description = "A simple yet fully-featured AI gateway built on top of the LiteLLM Router SDK with MCP server support."
readme = "README.md"
requires-python = ">=3.11"
dependencies = [
    "asgiref>=3.8.1",
    "celery[redis]>=5.5.2",
    "daphne>=4.2.1",
    "django>=5.2.7",
    "django-celery-beat>=2.8.1",
    "django-silk>=5.4.0",
    "django-tos>=1.1.0",
    "httpx>=0.28.1, <1",
    "litellm==1.72.0",
    "mcp==1.25.0",
    "mozilla-django-oidc>=4.0.1",
    "openai>=2.13.0",
    "whitenoise>=6.9.0",
]

[project.optional-dependencies]
postgresql = [
    "psycopg2-binary>=2.9.10",
]
vllm = [
    "vllm==0.8.4",
]

[dependency-groups]
dev = [
    "channels[daphne]>=4.3.1",
    "fastapi>=0.115.12",
    "pre-commit>=4.2.0",
    "ruff>=0.15.5",
    "tbump>=6.11.0",
]

[tool.ruff]
line-length = 120
target-version = "py311"
extend-exclude = [
    "**/migrations/*.py",
    "aqueduct/aqueduct/settings.py",
    "charts/**/*",
]

[tool.ruff.lint]
select = [
    "E",      # pycodestyle errors
    "W",      # pycodestyle warnings
    "F",      # Pyflakes
    "I",      # isort
    "UP",     # pyupgrade
    "B",      # flake8-bugbear
    "C4",     # flake8-comprehensions
    "RUF",    # Ruff-specific rules
    "DJ",     # Django-specific patterns
    "SIM",    # flake8-simplify
    "RET",    # flake8-return simplifications
    "PTH",    # flake8-use-pathlib
    "PIE",    # flake8-pie miscellaneous lints
    "S",      # flake8-bandit security checks
    "BLE",    # flake8-blind-except
    "TRY",    # tryceratops
    "EM",     # flake8-errmsg
    "DTZ",    # flake8-datetimez
    "ERA",    # flake8-eraduate commented-out code
    "PLR0402", # Use `from` instead of `import ... as ...`
    "PLR1714", # Repeated equality comparisons -> use `in`
    "PLR2004", # Avoid magic values in comparisons
    "PLR5501", # Use `elif` instead of `else` then `if`
    "PLW2901", # Redefined loop variables
    "PLW1508", # Invalid environment variable default
    "PLW1509", # Avoid preexec_fn in subprocess calls
    "ANN201", # Missing return type annotation for public function
    "ANN202", # Missing return type annotation for private function
    "ANN204", # Missing return type annotation for special method
    "ANN205", # Missing return type annotation for staticmethod
    "ANN206", # Missing return type annotation for classmethod
]
ignore = ["TRY003", "EM101", "EM102", "TRY401", "TRY301", "FIX", "PLC0415"]

[tool.ruff.format]
docstring-code-format = true
skip-magic-trailing-comma = true

[tool.ruff.lint.isort]
known-first-party = ["aqueduct", "gateway", "management", "mock_api"]

[tool.ruff.lint.flake8-annotations]
mypy-init-return = true
suppress-none-returning = true

[tool.ruff.lint.per-file-ignores]
# Ignore `F401` (imported but unused) in all `__init__.py` files
"__init__.py" = ["F401"]
# Ignore ANN return type rules in test files
# DJ007: ModelForm using fields = "__all__" is acceptable for this use case
# BLE001 in admin actions is intentional for error handling
"**/admin.py" = ["DJ007", "BLE001"]
# DJ012: Model ordering is a style preference, not critical for functionality
"**/models.py" = ["DJ012"]
# DJ001: null=True on Request.model with noqa comment - per-file ignore as fallback
# ERA001: JSON structure example comment is useful documentation
"**/management/models.py" = ["DJ001", "BLE001", "ERA"]
# SIM117: Nested async with statements in tests - this pattern is correct and readable
# PT: Using unittest-style assertions (self.assertEqual) in unittest test classes
# FIX: TODO/FIXME comments are useful for tracking work
# ANN: Return type annotations not enforced in tests
"**/tests/*.py" = ["SIM117", "S101", "S105", "S106", "S108", "BLE001", "PT", "FIX", "ANN201", "ANN202", "ANN204", "ANN205", "ANN206"]
"**/tests/**/*.py" = ["SIM117", "S101", "S105", "S106", "S108", "BLE001", "S607", "PT", "FIX", "ANN201", "ANN202", "ANN204", "ANN205", "ANN206"]
# SIM105: suppress(Exception) may mask too much, prefer explicit error handling
"**/management/*.py" = ["SIM105"]
# SIM108: Ternary operator may reduce clarity for boolean logic with hasattr
"**/management/*" = ["SIM108"]
# SIM102: Nested if with `and` combining may change logic order
"**/management/forms.py" = ["SIM102"]
# RET504: Explicit return of form in view pattern is intentional
"**/management/views/tokens.py" = ["RET504"]
# Examples directory and debug scripts: exceptions allowed for code clarity
"examples/*.py" = ["PTH", "SIM", "SIM115", "BLE001", "ERA"]
"file_id_debug.py" = ["PTH", "SIM", "SIM115", "ERA"]
# BLE001: Blind except is intentional in views to return proper error responses
"**/views/*.py" = ["BLE001"]
# Phase 3: Additional BLE001 ignores
"celery.py" = ["BLE001"]
